services:
  - type: web
    name: word-and-phrase
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free             # 15-min sleep. Persistence comes from external Postgres
                           # (DATABASE_URL set in dashboard, e.g. Neon / Supabase free tier).
    region: singapore      # nearest Asia region; options: oregon / ohio / frankfurt / singapore
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: OPEN_BROWSER
        value: "0"
      - key: COOKIE_SECURE
        value: "1"
      - key: DATABASE_URL
        sync: false        # set in Render dashboard: postgres://user:pass@host/db?sslmode=require
