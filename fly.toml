app = "word-and-phrase"
primary_region = "hkg"  # change: nrt (Tokyo), sin (Singapore), sjc (San Jose), fra (Frankfurt)

[build]

[env]
  HOST = "0.0.0.0"
  OPEN_BROWSER = "0"
  COOKIE_SECURE = "1"
  WORDPHRASE_DB_DIR = "/data"

[http_service]
  internal_port = 8765
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[mounts]]
  source = "wordphrase_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
